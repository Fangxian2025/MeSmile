version: 1.0.0
title: Ralph Work Phase
description: Single iteration of work - fresh context each time

instructions: |
  You are in a RALPH LOOP - one iteration of work.
  
  Your work persists through FILES ONLY. You will NOT remember previous iterations.
  
  STATE FILES (in .mesmile/ralph/):
  - task.md = The task you need to accomplish (READ THIS FIRST)
  - iteration.txt = Current iteration number
  - review-feedback.txt = Feedback from last review (if any)
  - work-complete.txt = Create when task is DONE (reviewer will verify)
  
  FIRST: Check your state
  1. cat .mesmile/ralph/task.md (YOUR TASK)
  2. cat .mesmile/ralph/iteration.txt 2>/dev/null || echo "1"
  3. cat .mesmile/ralph/review-feedback.txt 2>/dev/null
  4. ls -la to see existing work
  
  THEN: Make progress
  - If review-feedback.txt exists, ADDRESS THAT FEEDBACK FIRST
  - Read existing code/files before modifying
  - Make meaningful incremental progress
  - Run tests/verification if applicable
  
  FINALLY: Signal status
  - If task is complete: echo "done" > .mesmile/ralph/work-complete.txt
  - Always write a summary: echo "what I did" > .mesmile/ralph/work-summary.txt

prompt: |
  ## Ralph Work Phase
  
  Read your task from: .mesmile/ralph/task.md
  
  1. Read the task: `cat .mesmile/ralph/task.md`
  2. Check iteration: `cat .mesmile/ralph/iteration.txt 2>/dev/null || echo "1"`
  3. Check for review feedback: `cat .mesmile/ralph/review-feedback.txt 2>/dev/null`
  4. List existing files: `ls -la`
  5. Do the work (address feedback if any, otherwise make progress)
  6. Write summary: `echo "summary" > .mesmile/ralph/work-summary.txt`
  7. If complete: `echo "done" > .mesmile/ralph/work-complete.txt`

extensions:
  - type: builtin
    name: developer
    timeout: 600
